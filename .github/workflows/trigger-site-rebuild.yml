name: Trigger Site Rebuild

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SITE_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/GDGXICA/gdgxica.github.io/dispatches \
            -d '{"event_type":"data-updated"}'
